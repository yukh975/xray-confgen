<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VLESS → xray config</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
    <div class="container">

        <div class="page-header">
            <div>
                <h1>VLESS <span class="arrow">→</span> xray config</h1>
                <p class="subtitle" data-i18n-html="subtitle"></p>
            </div>
            <div class="lang-switcher">
                <button type="button" id="lang-en" class="lang-btn">EN</button>
                <span class="lang-sep">|</span>
                <button type="button" id="lang-ru" class="lang-btn">RU</button>
            </div>
        </div>

        <form id="vless-form" novalidate>

            <!-- Inbound -->
            <div class="section-title">Inbound</div>

            <div class="field-row">
                <div class="field-group">
                    <label for="inbound_ip" data-i18n="inbound_ip_label"></label>
                    <input
                        type="text"
                        id="inbound_ip"
                        name="inbound_ip"
                        placeholder="0.0.0.0"
                        value="0.0.0.0"
                        pattern="^(\d{1,3}\.){3}\d{1,3}$"
                        required
                    >
                    <span class="hint" data-i18n="inbound_ip_hint"></span>
                </div>

                <div class="field-group field-group--port">
                    <label for="inbound_port" data-i18n="inbound_port_label"></label>
                    <input
                        type="number"
                        id="inbound_port"
                        name="inbound_port"
                        placeholder="10808"
                        value="10808"
                        min="1"
                        max="65535"
                        required
                    >
                    <span class="hint" data-i18n="inbound_port_hint"></span>
                </div>
            </div>

            <!-- SOCKS5 auth -->
            <div class="field-group">
                <label class="toggle-row">
                    <input type="checkbox" id="socks5_auth" name="socks5_auth">
                    <span class="toggle-label" data-i18n="socks5_auth_label"></span>
                </label>
                <div id="socks5-auth-fields" class="auth-fields hidden">
                    <div class="field-row" style="margin-top:10px">
                        <div class="field-group">
                            <label for="socks5_user" data-i18n="socks5_user_label"></label>
                            <input type="text" id="socks5_user" name="socks5_user" autocomplete="off">
                        </div>
                        <div class="field-group">
                            <label for="socks5_pass" data-i18n="socks5_pass_label"></label>
                            <div class="input-reveal">
                                <input type="password" id="socks5_pass" name="socks5_pass" autocomplete="new-password">
                                <button type="button" class="reveal-btn" id="reveal-pass" tabindex="-1">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- VLESS -->
            <div class="section-title">VLESS</div>

            <div class="field-group">
                <label for="vless_link" data-i18n="vless_link_label"></label>
                <textarea
                    id="vless_link"
                    name="vless_link"
                    placeholder="vless://uuid@host:port?security=tls&type=ws&path=/ws#name"
                    required
                ></textarea>
                <span class="hint" data-i18n="vless_link_hint"></span>
            </div>

            <!-- Databases -->
            <div class="section-title">Databases</div>

            <div id="db-list" class="db-list">
                <!-- populated by JS -->
            </div>

            <!-- Routing -->
            <div class="section-title">Routing</div>

            <div class="section-block">
                <div class="field-row" style="margin-bottom:6px">
                    <div class="field-group">
                        <label for="default_outbound" data-i18n="default_outbound_label"></label>
                        <select id="default_outbound">
                            <option value="proxy">proxy</option>
                            <option value="direct">direct</option>
                        </select>
                    </div>
                    <div class="field-group">
                        <label for="domain_strategy" data-i18n="domain_strategy_label"></label>
                        <select id="domain_strategy">
                            <option value="IPIfNonMatch">IPIfNonMatch</option>
                            <option value="IPOnDemand">IPOnDemand</option>
                            <option value="AsIs">AsIs</option>
                        </select>
                    </div>
                </div>
                <div class="hint" style="margin-bottom:6px" data-i18n="routing_hint"></div>
                <label class="toggle-row">
                    <input type="checkbox" id="block_bittorrent" name="block_bittorrent">
                    <span class="toggle-label" data-i18n="block_bittorrent_label"></span>
                </label>
                <div id="routing-rules">
                    <!-- populated by JS -->
                </div>
                <button type="button" id="add-rule-btn" class="add-btn" data-i18n="add_rule_btn"></button>
            </div>

            <!-- Logging -->
            <div class="section-title">Logging</div>

            <div class="field-group">
                <label class="toggle-row">
                    <input type="checkbox" id="log_enabled" name="log_enabled">
                    <span class="toggle-label" data-i18n="log_enabled_label"></span>
                </label>
                <div id="log-fields" class="auth-fields hidden">
                    <div class="field-row" style="margin-top:10px">
                        <div class="field-group">
                            <label for="log_dir" data-i18n="log_dir_label"></label>
                            <input type="text" id="log_dir" name="log_dir" placeholder="/var/log/xray">
                            <span class="hint" data-i18n="log_dir_hint"></span>
                        </div>
                        <div class="field-group field-group--level">
                            <label for="log_level" data-i18n="log_level_label"></label>
                            <select id="log_level">
                                <option value="debug">debug</option>
                                <option value="info">info</option>
                                <option value="warning" selected>warning</option>
                                <option value="error">error</option>
                                <option value="none">none</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <div class="actions">
                <button type="submit" id="submit-btn">
                    <span class="btn-text" data-i18n="submit_btn"></span>
                </button>
                <button type="button" id="clear-btn" class="secondary" data-i18n="clear_btn"></button>
            </div>
        </form>

        <div id="result" class="result hidden">
            <div class="result-header">
                <span>config.json</span>
                <div class="result-actions">
                    <button id="copy-btn" class="icon-btn">⎘ <span class="btn-label" data-i18n="copy_btn"></span></button>
                    <button id="download-btn" class="icon-btn">↓ <span class="btn-label" data-i18n="download_btn"></span></button>
                </div>
            </div>
            <pre id="result-json"></pre>
        </div>

        <div id="error" class="error hidden">
            <span id="error-text"></span>
        </div>

        <footer class="copyright">
            <div>© 2026 Yuriy Khachaturian</div>
            <div>v1.0.2</div>
        </footer>
    </div>

    <script src="assets/translations.js"></script>
    <script src="assets/app.js"></script>
</body>
</html>
